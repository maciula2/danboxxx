version: '3.8'

services:
  backend:
    build: ./backend
    container_name: danbo_api
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - db_data:/app/data
      - uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/danbo.db
      - UPLOADS_PATH=/app/uploads
    restart: unless-stopped
    command: npx nodemon server.js
  frontend:
    build: ./frontend
    container_name: danbo_web
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  uploads:
